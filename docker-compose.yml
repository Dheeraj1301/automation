services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-profitpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-profitpilot}
      POSTGRES_DB: ${POSTGRES_DB:-profitpilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-profitpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-profitpilot}:${POSTGRES_PASSWORD:-profitpilot}@postgres:5432/${POSTGRES_DB:-profitpilot}
      REDIS_URL: redis://redis:6379/0
      N8N_BASE_URL: http://n8n:5678
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: UTC
      N8N_SECURE_COOKIE: "false"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5678/healthz', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_STOREFRONT_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  storefront:
    build: ./storefront
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      MERCHANT_SLUG: ${STOREFRONT_MERCHANT_SLUG:-}
      SITE_URL: http://localhost:3001
    ports:
      - "3001:3000"
    volumes:
      - ./storefront:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  n8n_data:
