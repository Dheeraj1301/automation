# Production stack for a single VPS. Standalone file (not a dev override) -
# run with:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# See .env.production.example for every required variable and
# nginx/init-letsencrypt.sh for the one-time TLS bootstrap.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No published host port: only reachable from other containers on this
    # compose network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: '["https://${DOMAIN}","https://app.${DOMAIN}"]'
      FRONTEND_URL: https://app.${DOMAIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      N8N_BASE_URL: http://n8n:5678
      ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID:-}
      ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET:-}
      ZOHO_REDIRECT_URI: https://api.${DOMAIN}/api/integrations/zoho/callback
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: automation.${DOMAIN}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://automation.${DOMAIN}/
      GENERIC_TIMEZONE: UTC
      N8N_SECURE_COOKIE: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5678/healthz', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        NEXT_PUBLIC_STOREFRONT_URL: https://${DOMAIN}
    restart: unless-stopped
    depends_on:
      - backend

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://backend:8000
      MERCHANT_SLUG: ${STOREFRONT_MERCHANT_SLUG:-}
      SITE_URL: https://${DOMAIN}
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - storefront
      - backend
      - n8n

volumes:
  postgres_data:
  n8n_data:
